<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удивительный GIF Конструктор</title>
    <style>
        /* Базовые настройки и фон магического леса */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background: radial-gradient(circle at center, #0a2e1f 0%, #020b08 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Деревянная вывеска (Заголовок) */
        .wood-sign {
            background: linear-gradient(to bottom, #6b4423, #3d2314);
            padding: 15px 40px;
            border-radius: 10px;
            border: 3px solid #2a160b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.5);
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        .wood-sign h1 {
            margin: 0;
            color: #d4e86a;
            font-size: 36px;
            text-shadow: 2px 2px 0px #1a3300, 4px 4px 5px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }

        /* Сетка конструктора */
        .grid-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Стиль панелей-карточек (как на картинке) */
        .panel {
            background: rgba(10, 30, 25, 0.85);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        /* Неоновые эффекты при наведении (разные цвета для разделов) */
        .panel.green:hover { border-color: #7fff00; box-shadow: 0 0 20px #7fff00; }
        .panel.yellow:hover { border-color: #ffd700; box-shadow: 0 0 20px #ffd700; }
        .panel.blue:hover { border-color: #00bfff; box-shadow: 0 0 20px #00bfff; }
        .panel.purple:hover { border-color: #da70d6; box-shadow: 0 0 20px #da70d6; }

        .panel-title {
            color: #ffd700;
            font-size: 20px;
            margin-top: 0;
            text-align: center;
            border-bottom: 1px dashed rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }

        /* Элементы управления */
        input[type="file"], input[type="text"], select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.5);
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        label {
            font-size: 14px;
            color: #a0d8c0;
            display: block;
            margin-top: 15px;
        }

        /* Центральный экран предпросмотра */
        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            position: relative;
            background: repeating-conic-gradient(rgba(0,0,0,0.1) 0% 25%, transparent 0% 50%) 50% / 20px 20px;
        }
        .preview-area img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            object-fit: contain;
        }

        /* Кнопки действий */
        .btn-action {
            background: linear-gradient(135deg, #2e8b57, #006400);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid #3cb371;
            transition: all 0.3s ease;
        }
        .btn-action:hover {
            background: #3cb371;
            box-shadow: 0 0 15px #3cb371;
            transform: scale(1.05);
        }

        .btn-download {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #333;
            font-size: 20px;
            border: 2px solid #fff;
            margin-top: 20px;
            padding: 15px;
            animation: pulse 2s infinite;
        }
        .btn-download:hover {
            box-shadow: 0 0 25px #ffd700;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* Ползунки и радио-кнопки */
        .radio-group { display: flex; justify-content: space-between; margin-top: 10px; }
        .radio-group label { display: inline; margin: 0; color: white; cursor: pointer; }
        
        /* Анимация при обработке */
        .processing { filter: brightness(1.5) sepia(1) hue-rotate(90deg) saturate(3); animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, -1px) rotate(1deg); } }

    </style>
</head>
<body>

    <div class="wood-sign">
        <h1>✨ Магический GIF Конструктор ✨</h1>
    </div>

    <div class="grid-container">
        <!-- ЛЕВАЯ ПАНЕЛЬ: Загрузка и Фон -->
        <div class="column">
            <div class="panel green">
                <h2 class="panel-title">1. Источник магии</h2>
                <label>Загрузить с устройства:</label>
                <input type="file" id="fileInput" accept="image/*">
                
                <label>Или вставить ссылку:</label>
                <input type="text" id="urlInput" placeholder="https://.../image.jpg">
                <button class="btn-action" onclick="loadImageFromUrl()">Загрузить по ссылке</button>
            </div>

            <div class="panel blue" style="margin-top: 20px;">
                <h2 class="panel-title">2. Работа с фоном</h2>
                <button class="btn-action" id="btnRemoveBg" onclick="removeBackground()">✨ Удалить фон (Магия AI)</button>
                <button class="btn-action" style="margin-top: 10px;" onclick="toggleTransparency()">Сделать фон прозрачным</button>
            </div>
        </div>

        <!-- ЦЕНТРАЛЬНАЯ ПАНЕЛЬ: Предпросмотр -->
        <div class="column">
            <div class="panel yellow preview-area" id="previewPanel">
                <h2 class="panel-title" style="position: absolute; top: 10px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px;">Волшебное зеркало</h2>
                <img id="previewImage" src="" alt="Ваш герой появится здесь" style="display: none;">
                <p id="placeholderText">Загрузите картинку для начала...</p>
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ: Анимация и Экспорт -->
        <div class="column">
            <div class="panel purple">
                <h2 class="panel-title">3. Оживление героя</h2>
                <label>Выберите заклинание (Эффект):</label>
                <select id="effectSelect">
                    <option>Не выбрано</option>
                    <optgroup label="Лицо">
                        <option>Подмигивание и улыбка</option>
                        <option>Разговор (движение губ)</option>
                        <option>Удивление (глаза)</option>
                    </optgroup>
                    <optgroup label="Руки">
                        <option>Машет рукой (Приветствие)</option>
                        <option>Магический пасс руками</option>
                        <option>Указывает пальцем</option>
                    </optgroup>
                    <optgroup label="Тело">
                        <option>Дыхание (поднятие груди)</option>
                        <option>Легкое покачивание (Idle)</option>
                        <option>Прыжок на месте</option>
                    </optgroup>
                    <optgroup label="Окружение">
                        <option>Светящиеся споры (как на грибах)</option>
                        <option>Падающие листья</option>
                    </optgroup>
                </select>
                <button class="btn-action" onclick="applyEffect()">Применить анимацию</button>
            </div>

            <div class="panel green" style="margin-top: 20px;">
                <h2 class="panel-title">4. Экспорт зелья</h2>
                <label>Сжатие (Размер файла):</label>
                <div class="radio-group">
                    <label><input type="radio" name="size" checked> До 5 МБ</label>
                    <label><input type="radio" name="size"> До 10 МБ</label>
                </div>

                <label>Качество (Разрешение):</label>
                <select>
                    <option>Стандарт (720p)</option>
                    <option>HD (1080p)</option>
                    <option>4K Ultra</option>
                    <option>8K Magic (Макс. плотность)</option>
                </select>

                <button class="btn-action btn-download" onclick="downloadGif()">💾 СКАЧАТЬ GIF</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const placeholderText = document.getElementById('placeholderText');

        // Обработка загрузки файла
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImage.src = event.target.result;
                    previewImage.style.display = 'block';
                    placeholderText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Имитация загрузки по ссылке
        function loadImageFromUrl() {
            const url = document.getElementById('urlInput').value;
            if(url) {
                previewImage.src = url;
                previewImage.style.display = 'block';
                placeholderText.style.display = 'none';
            } else {
                alert('Пожалуйста, вставьте ссылку!');
            }
        }

        // Имитация удаления фона
        function removeBackground() {
            if(previewImage.src) {
                // Визуальный эффект "обработки"
                previewImage.classList.add('processing');
                setTimeout(() => {
                    previewImage.classList.remove('processing');
                    alert("В реальном приложении здесь нейросеть вырезала бы фон. Сейчас мы просто показали анимацию магии!");
                    // В реале: отправка картинки на бэкенд, возврат PNG с альфа-каналом
                }, 1500);
            }
        }

        // Имитация применения эффекта
        function applyEffect() {
            const effect = document.getElementById('effectSelect').value;
            if(previewImage.src && effect !== 'Не выбрано') {
                previewImage.classList.add('processing');
                setTimeout(() => {
                    previewImage.classList.remove('processing');
                    alert(`Применена нейро-анимация: "${effect}". В Genially эта GIF будет проигрываться циклично.`);
                }, 2000);
            }
        }

        // Скачивание
        function downloadGif() {
            if(!previewImage.src) {
                alert('Сначала загрузите и заколдуйте картинку!');
                return;
            }
            // Логика автоскачивания (в данном случае скачает исходную картинку для примера)
            const a = document.createElement('a');
            a.href = previewImage.src;
            a.download = 'magic_animation.gif';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert("Ваш шедевр сохранен! Теперь его можно загрузить в Genially.");
        }
    </script>

</body>
</html>
